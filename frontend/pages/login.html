<section class="login-page">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo-circle">
        <span class="login-logo-icon" aria-hidden="true">🛒</span>
      </div>

      <h1 class="login-brand">VarejoSync</h1>
      <p class="login-subtitle">Sistema de Gestão Varejista</p>
    </div>

    <div class="login-form-wrap">
      <h2 class="login-title">Acesse o sistema</h2>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field-group">
          <label for="loginUsuario" class="field-label">Usuário</label>
          <div class="field field-with-icon">
            <span class="field-icon" aria-hidden="true">✉</span>
            <input
              type="text"
              id="loginUsuario"
              name="usuario"
              placeholder="Digite seu usuário"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="loginSenha" class="field-label">Senha</label>
          <div class="field field-with-icon field-with-action">
            <span class="field-icon" aria-hidden="true">🔒</span>
            <input
              type="password"
              id="loginSenha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="field-action-btn"
              id="toggleSenha"
              aria-label="Mostrar senha"
              title="Mostrar senha"
            >
              ○
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary login-btn">Entrar</button>
      </form>

      <div class="login-actions">
        <button type="button" class="login-link-btn" id="btnEsqueciSenha">
          Esqueceu sua senha?
        </button>
      </div>

      <p id="loginStatus" class="login-status" aria-live="polite"></p>
    </div>
  </div>
</section>
