<section class="login-page">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo-circle">
        <span class="login-logo-icon" aria-hidden="true">🛒</span>
      </div>

      <h1 class="login-brand">VarejoSync</h1>
      <p class="login-subtitle">Sistema de Gestão Varejista</p>
    </div>

    <div class="login-form-wrap">
      <h2 class="login-title">Acesse o sistema</h2>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field-group">
          <label for="loginUsuario" class="field-label">Usuário</label>
          <div class="field field-with-icon">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 7.75A1.75 1.75 0 0 1 5.75 6h12.5A1.75 1.75 0 0 1 20 7.75v8.5A1.75 1.75 0 0 1 18.25 18H5.75A1.75 1.75 0 0 1 4 16.25v-8.5Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                />
                <path
                  d="m5 7 7 5 7-5"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>

            <input
              type="text"
              id="loginUsuario"
              name="usuario"
              placeholder="Digite seu usuário"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="loginSenha" class="field-label">Senha</label>
          <div class="field field-with-icon field-with-action">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7.5 10V7.75a4.5 4.5 0 1 1 9 0V10"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
                <rect
                  x="5"
                  y="10"
                  width="14"
                  height="10"
                  rx="2.5"
                  stroke="currentColor"
                  stroke-width="1.7"
                />
              </svg>
            </span>

            <input
              type="password"
              id="loginSenha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
            />

            <button
              type="button"
              class="field-action-btn"
              id="toggleSenha"
              aria-label="Mostrar senha"
              title="Mostrar senha"
            >
              <svg
                class="icon-eye"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linejoin="round"
                />
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                  stroke="currentColor"
                  stroke-width="1.7"
                />
              </svg>

              <svg
                class="icon-eye-off"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M3 3l18 18"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
                <path
                  d="M10.6 6.2A10.7 10.7 0 0 1 12 6c6 0 9.5 6 9.5 6a17.3 17.3 0 0 1-3.2 3.8"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M6.1 7.1C3.9 8.7 2.5 12 2.5 12s3.5 6 9.5 6c1.5 0 2.8-.3 4-.8"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9.9 9.9a3 3 0 0 0 4.2 4.2"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary login-btn">Entrar</button>
      </form>

      <div class="login-actions">
        <button type="button" class="login-link-btn" id="btnEsqueciSenha">
          Esqueceu sua senha?
        </button>
      </div>

      <p id="loginStatus" class="login-status" aria-live="polite"></p>
    </div>
  </div>
</section>
